apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: alloy
      version: ">= 0.1.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 10m
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
