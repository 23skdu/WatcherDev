apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: monitoring-gateway
  hostnames:
    - "grafana.watcher.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: monitoring-gateway
  hostnames:
    - "prometheus.watcher.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
